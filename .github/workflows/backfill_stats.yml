name: Backfill MLB Stats & Reports

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date (YYYY-MM-DD)"
        required: true
        default: "2026-03-25"
      end_date:
        description: "End date (YYYY-MM-DD)"
        required: true
        default: "2026-04-07"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backfill:
    name: Backfill stats & reports
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Clean up invalid week data
        run: python -m scripts.cleanup_bad_weeks
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}

      - name: Backfill MLB stats
        run: python -m scripts.backfill_stats "${{ inputs.start_date }}" "${{ inputs.end_date }}"
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}

      - name: Backfill daily reports
        run: python -m scripts.backfill_reports "${{ inputs.start_date }}" "${{ inputs.end_date }}"
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
