name: CI and Deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:  # allow manual trigger

jobs:
  # ── Step 1: lint, type-check, test ────────────────────────────────────────
  quality:
    name: Lint, type-check, and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]" pandas-stubs

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy src/

      - name: Test
        run: pytest -q
        env:
          # No real credentials — tests use in-memory DuckDB
          MOTHERDUCK_TOKEN: ""
          YAHOO_CONSUMER_KEY: ""
          YAHOO_CONSUMER_SECRET: ""
          YAHOO_ACCESS_TOKEN: ""
          YAHOO_REFRESH_TOKEN: ""

  # ── Step 2: deploy (only on main, only if quality passes) ─────────────────
  deploy:
    name: Deploy to shinyapps.io
    needs: quality
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deployment dependencies
        run: pip install rsconnect-python

      - name: Deploy to shinyapps.io
        env:
          SHINYAPPS_ACCOUNT: ${{ secrets.SHINYAPPS_ACCOUNT }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          YAHOO_TEAM_KEY: ${{ secrets.YAHOO_TEAM_KEY }}
        run: |
          rsconnect deploy shiny . \
            --title "Fantasy Baseball Dashboard" \
            -E MOTHERDUCK_TOKEN \
            -E YAHOO_TEAM_KEY

# ── GitHub Secrets required ───────────────────────────────────────────────────
# SHINYAPPS_ACCOUNT  — shinyapps.io account name (e.g. chris-selig)
# SHINYAPPS_TOKEN    — shinyapps.io token (from shinyapps.io → Account → Tokens)
# SHINYAPPS_SECRET   — shinyapps.io token secret
# MOTHERDUCK_TOKEN   — MotherDuck access token (passed to the deployed app)
# YAHOO_TEAM_KEY     — Yahoo Fantasy team key, e.g. 422.l.87941.t.3
#
# Add these at: github.com/<owner>/<repo>/settings/secrets/actions
