name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    name: Lint, type-check, and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]" pandas-stubs

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy src/

      - name: Test
        run: pytest -q
        env:
          # No real credentials — tests use in-memory DuckDB
          MOTHERDUCK_TOKEN: ""
          YAHOO_CONSUMER_KEY: ""
          YAHOO_CONSUMER_SECRET: ""
          YAHOO_ACCESS_TOKEN: ""
          YAHOO_REFRESH_TOKEN: ""
