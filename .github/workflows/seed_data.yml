name: Seed MotherDuck (2025 simulation)

on:
  schedule:
    # Run daily at 9 am MT (3 pm UTC) — same cadence as the real pipeline
    - cron: '0 15 * * *'
  workflow_dispatch:
    inputs:
      run_date:
        description: "Simulate run date (YYYY-MM-DD)"
        required: false
        default: "2025-06-11"
      seed:
        description: "Random seed for roster assignment"
        required: false
        default: "42"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  seed:
    name: Seed MotherDuck with real 2025 MLB stats
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e "." pandas-stubs

      - name: Seed MotherDuck
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          # Use explicit date input if provided (workflow_dispatch),
          # otherwise default to 2025-06-11 for the scheduled run.
          RUN_DATE="${{ github.event.inputs.run_date }}"
          if [ -z "$RUN_DATE" ]; then
            RUN_DATE="2025-06-11"
          fi
          SEED_VAL="${{ github.event.inputs.seed }}"
          if [ -z "$SEED_VAL" ]; then
            SEED_VAL="42"
          fi
          python scripts/seed_motherduck_2025.py \
            --clear \
            --date "$RUN_DATE" \
            --seed "$SEED_VAL" \
            --verbose

# ── Purpose ───────────────────────────────────────────────────────────────────
# Simulates the daily pipeline during the 2025/2026 offseason for testing.
# Clears and re-seeds MotherDuck with real 2025 FanGraphs stats tagged to
# 2025-06-11, so the Shiny app shows live data with a yellow stale banner.
#
# Replace with daily_pipeline.yml once the 2026 season starts and Yahoo
# OAuth credentials are available.
#
# Requires: MOTHERDUCK_TOKEN GitHub Actions secret.
