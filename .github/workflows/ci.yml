name: CI and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Step 1: lint, type-check, test ────────────────────────────────────────
  quality:
    name: Lint, type-check, and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]" pandas-stubs

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy src/

      - name: Test
        run: pytest -q
        env:
          MOTHERDUCK_TOKEN: ""
          YAHOO_CONSUMER_KEY: ""
          YAHOO_CONSUMER_SECRET: ""
          YAHOO_ACCESS_TOKEN: ""
          YAHOO_REFRESH_TOKEN: ""

  # ── Step 2: deploy (only if quality passes) ───────────────────────────────
  deploy:
    name: Deploy to shinyapps.io
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deployment dependencies
        run: pip install rsconnect-python

      - name: Deploy to shinyapps.io
        env:
          SHINYAPPS_ACCOUNT: ${{ secrets.SHINYAPPS_ACCOUNT }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          rsconnect deploy shiny . \
            --title "Fantasy Baseball Dashboard" \
            -E MOTHERDUCK_TOKEN

# ── GitHub Secrets required ───────────────────────────────────────────────────
# SHINYAPPS_ACCOUNT  — shinyapps.io account name (e.g. chris-selig)
# SHINYAPPS_TOKEN    — shinyapps.io token (from shinyapps.io → Account → Tokens)
# SHINYAPPS_SECRET   — shinyapps.io token secret
# MOTHERDUCK_TOKEN   — MotherDuck access token (passed to the deployed app)
#
# The app reads my_team_key from config/league_settings.yaml — no Yahoo
# credentials needed in the Shiny app.
#
# Add these at: github.com/<owner>/<repo>/settings/secrets/actions
