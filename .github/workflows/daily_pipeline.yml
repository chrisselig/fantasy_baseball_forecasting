name: Daily Fantasy Baseball Pipeline

on:
  schedule:
    # 9am MT = 3pm UTC (UTC-6). Adjust by 1hr during MDT (UTC-6 → UTC-7 = 4pm UTC).
    # During standard time (Nov-Mar): cron '0 16 * * *'
    # During daylight time  (Mar-Nov): cron '0 15 * * *'
    - cron: '0 15 * * *'
  workflow_dispatch:  # allow manual trigger any time

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run daily pipeline
        run: python -m src.pipeline.daily_run
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          YAHOO_CONSUMER_KEY: ${{ secrets.YAHOO_CONSUMER_KEY }}
          YAHOO_CONSUMER_SECRET: ${{ secrets.YAHOO_CONSUMER_SECRET }}
          YAHOO_ACCESS_TOKEN: ${{ secrets.YAHOO_ACCESS_TOKEN }}
          YAHOO_REFRESH_TOKEN: ${{ secrets.YAHOO_REFRESH_TOKEN }}

# ── GitHub Secrets required ───────────────────────────────────────────────────
# MOTHERDUCK_TOKEN       — MotherDuck access token
# YAHOO_CONSUMER_KEY     — Yahoo app consumer key
# YAHOO_CONSUMER_SECRET  — Yahoo app consumer secret
# YAHOO_ACCESS_TOKEN     — Generated by scripts/yahoo_auth.py
# YAHOO_REFRESH_TOKEN    — Generated by scripts/yahoo_auth.py
#
# The Shiny app on shinyapps.io only needs MOTHERDUCK_TOKEN.
# Yahoo credentials live here only.
