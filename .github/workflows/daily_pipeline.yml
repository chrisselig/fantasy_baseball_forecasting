name: Daily Fantasy Baseball Pipeline

on:
  schedule:
    # 9 am MT (UTC-6 standard / UTC-7 daylight).
    # Standard time (Nov-Mar): cron '0 16 * * *'
    # Daylight time  (Mar-Nov): cron '0 15 * * *'
    - cron: '0 15 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-pipeline:
    name: Run daily pipeline
    runs-on: ubuntu-latest
    # Only run on schedule or manual dispatch — not on any implicit push triggers.
    # Also skip entirely during pre-season when Yahoo credentials are not yet set.
    if: |
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') &&
      vars.PIPELINE_ENABLED == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]" pynacl

      - name: Run daily pipeline
        run: python -m src.pipeline.daily_run
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          YAHOO_CONSUMER_KEY: ${{ secrets.YAHOO_CONSUMER_KEY }}
          YAHOO_CONSUMER_SECRET: ${{ secrets.YAHOO_CONSUMER_SECRET }}
          YAHOO_ACCESS_TOKEN: ${{ secrets.YAHOO_ACCESS_TOKEN }}
          YAHOO_REFRESH_TOKEN: ${{ secrets.YAHOO_REFRESH_TOKEN }}
          YAHOO_TEAM_ID: ${{ secrets.YAHOO_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

# ── Enabling this workflow ─────────────────────────────────────────────────────
# This workflow is disabled by default (PIPELINE_ENABLED is unset).
# To enable after the 2026 draft and Yahoo OAuth setup:
#   1. Add all Yahoo secrets (YAHOO_CONSUMER_KEY, etc.)
#   2. Set repository variable PIPELINE_ENABLED = 'true' at:
#      github.com/<owner>/<repo>/settings/variables/actions
#
# Until then, use the "Seed MotherDuck (2025 simulation)" workflow for testing.
#
# ── GitHub Secrets required ───────────────────────────────────────────────────
# MOTHERDUCK_TOKEN       — MotherDuck access token
# YAHOO_CONSUMER_KEY     — Yahoo app consumer key
# YAHOO_CONSUMER_SECRET  — Yahoo app consumer secret
# YAHOO_ACCESS_TOKEN     — Generated by scripts/yahoo_auth.py
# YAHOO_REFRESH_TOKEN    — Generated by scripts/yahoo_auth.py (auto-rotated)
# YAHOO_TEAM_ID          — Yahoo fantasy team ID integer
# GITHUB_TOKEN           — Auto-provided; needed for OAuth token writeback
#
# The Shiny app only needs MOTHERDUCK_TOKEN — Yahoo credentials stay here.
